name = "tappit-web"
main = "./worker/index.ts"
compatibility_date = "2026-04-06"

[assets]
directory = "./out"
binding = "ASSETS"

# Runtime variables read by the Worker entry (worker/index.ts).
# CTA_MODE controls which state the site is in:
#   "waitlist"    — show waitlist sign-up buttons; price section shown as "coming soon"
#   "on-sale"     — show download + buy buttons; full price section with countdown
#   "placeholder" — show price section (no buttons); used before waitlist or after sale ends
# Because this is a Worker with static assets, values must be edited here (or via
# `wrangler secret` for sensitive values) and redeployed with `wrangler deploy`.
routes = [
  { pattern = "gettappit.com", custom_domain = true, zone_name = "gettappit.com" }
]

# Runtime variables read by the Worker entry (worker/index.ts).
# CTA_MODE: "waitlist" | "on-sale"
# Secrets (set via `wrangler secret put`, never commit here):
#   LICENSE_SIGNING_PRIVATE_KEY
[vars]
CTA_MODE = "on-sale"
WAITLIST_URL = ""
PURCHASE_URL = "https://buy.stripe.com/test_7sYeVeeiu5ZU8Tpb8G1kA00"
NEXT_PUBLIC_STRIPE_PAYMENT_LINK = "https://buy.stripe.com/test_7sYeVeeiu5ZU8Tpb8G1kA00"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = false
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
