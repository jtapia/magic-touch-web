name = "tappit-web"
main = "./worker/index.ts"
compatibility_date = "2026-04-06"

[assets]
directory = "./out"
binding = "ASSETS"

routes = [
  { pattern = "gettappit.com", custom_domain = true, zone_name = "gettappit.com" }
]

# Secrets (set via `wrangler secret put`, never commit here):
#   LICENSE_SIGNING_PRIVATE_KEY
[vars]
PURCHASE_URL = "https://buy.stripe.com/test_7sYeVeeiu5ZU8Tpb8G1kA00"
NEXT_PUBLIC_STRIPE_PAYMENT_LINK = "https://buy.stripe.com/test_7sYeVeeiu5ZU8Tpb8G1kA00"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = false
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
